<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0.1" />
    </radialGradient>
  </defs>


  <!-- Cercle extérieur principal -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#d4af37" stroke-width="2.5" opacity="0.95"/>
  
  <!-- Cercle intérieur -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#b59410" stroke-width="1.2" opacity="0.7"/>

  <!-- Fond radiant doré -->
  <circle cx="100" cy="100" r="90" fill="url(#goldGlow)" opacity="0.15"/>

  <!-- FLEUR SUPÉRIEURE (5 pétales) -->
  <g opacity="0.9">
    <!-- Pétale haut -->
    <ellipse cx="100" cy="58" rx="6" ry="14" fill="#d4af37"/>
    <!-- Pétale 2 (72°) -->
    <ellipse cx="100" cy="58" rx="6" ry="14" fill="#d4af37" transform="rotate(72 100 100)"/>
    <!-- Pétale 3 (144°) -->
    <ellipse cx="100" cy="58" rx="6" ry="14" fill="#d4af37" transform="rotate(144 100 100)"/>
    <!-- Pétale 4 (216°) -->
    <ellipse cx="100" cy="58" rx="6" ry="14" fill="#d4af37" transform="rotate(216 100 100)"/>
    <!-- Pétale 5 (288°) -->
    <ellipse cx="100" cy="58" rx="6" ry="14" fill="#d4af37" transform="rotate(288 100 100)"/>
    <!-- Cœur de fleur -->
    <circle cx="100" cy="100" r="5" fill="#ffd700"/>
  </g>

  <!-- URNE INFÉRIEURE -->
  <g opacity="0.9">
    <!-- Col de l'urne -->
    <rect x="93" y="116" width="14" height="7" fill="none" stroke="#d4af37" stroke-width="1.5"/>
    <!-- Corps principal -->
    <path d="M 91 123 Q 87 129 87 138 L 113 138 Q 113 129 109 123" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Base de l'urne -->
    <ellipse cx="100" cy="138" rx="14" ry="3.5" fill="none" stroke="#d4af37" stroke-width="1.5"/>
    <!-- Anses gauche et droite-->
    <path d="M 89 124 Q 81 127 82 135" fill="none" stroke="#b59410" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
    <path d="M 111 124 Q 119 127 118 135" fill="none" stroke="#b59410" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  </g>

  <!-- LIGNE HORIZONTALE DÉCORATIVE -->
  <line x1="52" y1="100" x2="148" y2="100" stroke="#d4af37" stroke-width="1.2" opacity="0.7"/>
  <circle cx="52" cy="100" r="3" fill="#ffd700" opacity="0.9"/>
  <circle cx="148" cy="100" r="3" fill="#ffd700" opacity="0.9"/>

  <!-- ORNEMENTS DIAGONAUX AUX COINS -->
  <!-- Haut gauche -->
  <path d="M 42 58 L 50 50" stroke="#d4af37" stroke-width="1.3" opacity="0.7" stroke-linecap="round"/>
  <circle cx="42" cy="58" r="2" fill="#ffd700" opacity="0.8"/>
  
  <!-- Haut droite -->
  <path d="M 158 58 L 150 50" stroke="#d4af37" stroke-width="1.3" opacity="0.7" stroke-linecap="round"/>
  <circle cx="158" cy="58" r="2" fill="#ffd700" opacity="0.8"/>
  
  <!-- Bas gauche -->
  <path d="M 42 142 L 50 150" stroke="#d4af37" stroke-width="1.3" opacity="0.7" stroke-linecap="round"/>
  <circle cx="42" cy="142" r="2" fill="#ffd700" opacity="0.8"/>
  
  <!-- Bas droite -->
  <path d="M 158 142 L 150 150" stroke="#d4af37" stroke-width="1.3" opacity="0.7" stroke-linecap="round"/>
  <circle cx="158" cy="142" r="2" fill="#ffd700" opacity="0.8"/>

  <!-- POINTS DÉCORÉRATIFS CARDINAUX -->
  <circle cx="100" cy="28" r="2.5" fill="#ffd700" opacity="0.85"/>
  <circle cx="100" cy="172" r="2.5" fill="#ffd700" opacity="0.85"/>
  <circle cx="28" cy="100" r="2.5" fill="#ffd700" opacity="0.85"/>
  <circle cx="172" cy="100" r="2.5" fill="#ffd700" opacity="0.85"/>

  <!-- PETITS CERCLES DÉCORÉRATIFS AUX COINS -->
  <circle cx="38" cy="38" r="3.5" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.6"/>
  <circle cx="162" cy="38" r="3.5" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.6"/>
  <circle cx="38" cy="162" r="3.5" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.6"/>
  <circle cx="162" cy="162" r="3.5" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.6"/>
</svg>
